<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portail Parents - EcoleGest HGD</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="entete">
        <h1>Portail <span>Parents</span></h1>
    </div>
    <div class="conteneur">
        <div class="login-box">
            <h2>Connexion</h2>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                    <div class="flash flash-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <input type="text" name="code" placeholder="Code de l'élève" required autofocus maxlength="10">
                <button type="submit">Voir les résultats</button>
            </form>
            <p class="hint" style="text-align:center;">Le code t'a été donné par l'école.</p>
        </div>
    </div>
</body>
</html>
